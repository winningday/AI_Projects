## Implementation Order

phases:
  phase_1_backend:
    description: Build the sync API
    tasks:
      - Set up Cloudflare Worker project
      - Create D1 database and schema
      - Implement auth endpoints (register, login, refresh, logout)
      - Implement sync endpoints (settings, dictionary, corrections, transcripts)
      - Add JWT middleware
      - Deploy and test with curl

  phase_2_ios:
    description: Add auth + sync to iOS app
    tasks:
      - Build AuthClient and SyncClient
      - Build LoginView and RegisterView
      - Build SyncManager with sync-on-launch
      - Add sync triggers to SharedConfig
      - Add deviceSource to transcripts
      - Test end-to-end

  phase_3_macos:
    description: Add auth + sync to macOS app
    tasks:
      - Port AuthClient and SyncClient (share most code)
      - Build login UI for macOS
      - Add SyncManager
      - Add sync triggers to ConfigManager
      - Test cross-device sync (iOS ↔ macOS)

  phase_4_polish:
    description: Production readiness
    tasks:
      - Add offline queue and retry logic
      - Add sync status indicator in UI
      - Add "last synced" timestamp display
      - Rate limiting on API
      - Add account deletion endpoint (GDPR)
      - Freemium tier enforcement (future)
