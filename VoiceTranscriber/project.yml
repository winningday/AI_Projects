name: VoiceTranscriber
options:
  bundleIdPrefix: com.voicetranscriber
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.24.0

targets:
  VoiceTranscriber:
    type: application
    platform: macOS
    sources:
      - path: VoiceTranscriber
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicetranscriber.app
        PRODUCT_NAME: VoiceTranscriber
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: VoiceTranscriber/Info.plist
        CODE_SIGN_ENTITLEMENTS: VoiceTranscriber/VoiceTranscriber.entitlements
        SWIFT_VERSION: "5.9"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: GRDB
    info:
      path: VoiceTranscriber/Info.plist
    entitlements:
      path: VoiceTranscriber/VoiceTranscriber.entitlements
